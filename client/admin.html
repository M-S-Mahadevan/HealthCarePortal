<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin • MedAssistant</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div id="sidebar"></div>
      <main class="content">
        <div class="topbar">
          <div>
            <h2 id="pageTitle">Admin</h2>
            <div class="meta">Register/Login (admin) and view protected dashboard</div>
          </div>
          <div class="row">
            <button id="btnLoadDashboard" class="btn primary" type="button">Load Dashboard</button>
          </div>
        </div>

        <div class="grid">
          <section class="card">
            <div class="card-header">
              <h3>Register Admin</h3>
              <span class="pill">JWT</span>
            </div>
            <div class="card-body">
              <form id="registerForm">
                <div class="row">
                  <div class="field">
                    <label>Name</label>
                    <input id="regName" required placeholder="e.g., Admin User" />
                  </div>
                  <div class="field">
                    <label>Email</label>
                    <input id="regEmail" type="email" required placeholder="e.g., admin@example.com" />
                  </div>
                </div>
                <div class="row">
                  <div class="field">
                    <label>Password</label>
                    <input id="regPassword" type="password" required placeholder="Choose a password" />
                  </div>
                </div>
                <div class="row" style="margin-top: 10px">
                  <button class="btn primary" type="submit">Register</button>
                </div>
                <div id="registerStatus" class="status"></div>
              </form>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <h3>Login Admin</h3>
              <span class="pill approved">Protected dashboard</span>
            </div>
            <div class="card-body">
              <form id="loginForm">
                <div class="row">
                  <div class="field">
                    <label>Email</label>
                    <input id="loginEmail" type="email" required placeholder="admin@example.com" />
                  </div>
                  <div class="field">
                    <label>Password</label>
                    <input id="loginPassword" type="password" required placeholder="Your password" />
                  </div>
                </div>
                <div class="row" style="margin-top: 10px">
                  <button class="btn primary" type="submit">Login</button>
                  <button class="btn danger" type="button" id="btnLogout2">Logout</button>
                </div>
                <div id="loginStatus" class="status"></div>
              </form>
            </div>
          </section>
        </div>

        <section class="card" style="margin-top: 14px">
          <div class="card-header">
            <h3>Dashboard</h3>
            <span class="pill">/api/admin/dashboard</span>
          </div>
          <div class="card-body">
            <div id="dashStatus" class="status"></div>
            <div class="row" id="countRow" style="margin-top: 10px"></div>
            <div style="margin-top: 14px; overflow: auto">
              <table>
                <thead>
                  <tr>
                    <th>Created</th>
                    <th>Date & Time</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="latestAppointmentsTbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
