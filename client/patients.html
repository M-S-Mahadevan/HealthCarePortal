<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients • MedAssistant</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div id="sidebar"></div>
      <main class="content">
        <div class="topbar">
          <div>
            <h2 id="pageTitle">Patients</h2>
            <div class="meta">Create, edit, and manage patient records</div>
          </div>
          <div class="row">
            <button id="btnRefresh" class="btn" type="button">Refresh</button>
          </div>
        </div>

        <div class="grid">
          <section class="card">
            <div class="card-header">
              <h3>Add / Update Patient</h3>
              <span class="pill">CRUD</span>
            </div>
            <div class="card-body">
              <form id="patientForm">
                <input type="hidden" id="patientId" />
                <div class="row">
                  <div class="field">
                    <label>Full Name</label>
                    <input id="fullName" required placeholder="e.g., Priya Verma" />
                  </div>
                  <div class="field">
                    <label>Age</label>
                    <input id="age" type="number" min="0" required placeholder="e.g., 20" />
                  </div>
                  <div class="field">
                    <label>Gender</label>
                    <select id="gender" required>
                      <option value="">Select</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>
                <div class="row">
                  <div class="field">
                    <label>Phone</label>
                    <input id="phone" required placeholder="e.g., 9876543210" />
                  </div>
                  <div class="field">
                    <label>Blood Group</label>
                    <input id="bloodGroup" required placeholder="e.g., O+" />
                  </div>
                </div>
                <div class="row">
                  <div class="field">
                    <label>Address</label>
                    <textarea id="address" required placeholder="Full address"></textarea>
                  </div>
                  <div class="field">
                    <label>Medical History</label>
                    <textarea id="medicalHistory" placeholder="Any known conditions / history"></textarea>
                  </div>
                </div>
                <div class="row" style="margin-top: 10px">
                  <button class="btn primary" type="submit" id="btnSubmit">Save Patient</button>
                  <button class="btn" type="button" id="btnClear">Clear</button>
                </div>
                <div id="formStatus" class="status"></div>
              </form>
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <div class="toolbar">
                <h3>Patients List</h3>
                <span class="hint">Tip: click “Edit” to load a record into the form</span>
              </div>
            </div>
            <div class="card-body">
              <div id="listStatus" class="status"></div>
              <div style="overflow: auto">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Age</th>
                      <th>Gender</th>
                      <th>Phone</th>
                      <th>Blood</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="patientsTbody"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/patients.js"></script>
  </body>
</html>
